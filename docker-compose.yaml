services:
  emulator:
    image: budtmo/docker-android:emulator_11.0
    ports:
      - 6080:6080    # Web-based VNC access to the emulator (optional)
      - 5554:5554    # Emulator console port
      - 5555:5555    # ADB communication port
    options: >-
      --privileged
      --device /dev/kvm
      -e EMULATOR_DEVICE="Samsung Galaxy S10"
      -e WEB_VNC=true
      -e APPIUM=false
      -e AUTO_RECORD=false
      -e ENFORCE_DEV_MODE=false
