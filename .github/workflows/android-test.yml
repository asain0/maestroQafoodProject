name: Teste APK com Maestro Framework

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3
      
      - name: Instalar ADB
        run: |
          sudo apt-get update
          sudo apt-get install -y adb

      - name: Instalar Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Iniciar emulador Android
        run: |
          docker compose up -d

      - name: Esperar emulador iniciar
        run: |
          adb wait-for-device
          adb devices
          sleep 20

      - name: Instalar APK
        run: |
          adb install qafoodTest.apk

      - name: Rodar testes Maestro
        run: |
          maestro test .maestro/
