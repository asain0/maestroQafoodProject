name: Teste APK com Maestro Framework

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Iniciar emulador Android
        run: |
          docker run -d \
            -p 5554:5554 \
            -p 5555:5555 \
            budtmo/docker-android:emulator_11.0

      - name: Esperar emulador iniciar
        run: |
          adb wait-for-device

      - name: Instalar APK
        run: |
          adb install app.apk

      - name: Rodar testes Maestro
        run: |
          maestro test .maestro/
